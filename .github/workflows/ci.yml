name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: contracts (install + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv
        run: uv venv

      - name: Install contracts (editable, with dev extras)
        run: uv pip install -e "./contracts[dev]"

      - name: Run tests
        run: uv run pytest contracts/tests -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install ruff
        run: uv tool install ruff

      - name: Lint
        run: uv tool run ruff check .

      - name: Format check
        run: uv tool run ruff format --check .
