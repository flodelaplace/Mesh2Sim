# Root pyproject: tooling config only. The actual Python packages live in subdirectories
# (each stage gets its own env per CLAUDE.md).

[tool.ruff]
line-length = 100
target-version = "py39"
# Excluded paths:
# - .venv / build / dist : Python tooling artifacts
# - stages/frontend_mhr/third_party : vendored sam_3d_body code, byte-equal to
#   yangtiming/Fast-SAM-3D-Body at the pinned commit. Linting it would tempt us
#   into touching upstream code, which breaks the vendor contract. See
#   stages/frontend_mhr/third_party/VENDORED.md.
extend-exclude = [
    ".venv",
    "build",
    "dist",
    "stages/frontend_mhr/third_party",
]

[tool.ruff.lint.per-file-ignores]
# Investigation / research scripts: long lines acceptable for verbose diagnostic prints.
"stages/frontend_mhr/investigate_mhr_params.py" = ["E501"]
"stages/frontend_mhr/disambiguate_suspects.py" = ["E501"]
"stages/frontend_mhr/map_204_to_components.py" = ["E501"]
# GPU integration tests have verbose diagnostic prints kept on one line for readability.
"stages/frontend_mhr/tests/test_integration_gpu.py" = ["E501"]
"stages/frontend_mhr/tests/test_shape_lock_gpu.py" = ["E501"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"
